specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  # ── StakingV2 ──────────────────────────────────────────────
  - kind: ethereum
    name: StakingV2
    network: sepolia
    source:
      address: "0x47e8c6f0A59dcD5977941Bac675b891Fd4c026d2"
      abi: StakingV2
      startBlock: 10495543
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Staker
        - StakeEvent
        - WithdrawEvent
        - ClaimEvent
        - ReferralEvent
        - ProtocolDay
        - ProtocolStats
      abis:
        - name: StakingV2
          file: ./abis/StakingV2.json
      eventHandlers:
        - event: Staked(indexed address,uint256,uint8,uint256)
          handler: handleStaked
        - event: Withdrawn(indexed address,uint256)
          handler: handleWithdrawn
        - event: RewardClaimed(indexed address,uint256,uint256)
          handler: handleRewardClaimed
        - event: ReferralBonus(indexed address,indexed address,uint256)
          handler: handleReferralBonus
      file: ./src/stakingV2.ts

  # ── VeSTK ─────────────────────────────────────────────────
  - kind: ethereum
    name: VeSTK
    network: sepolia
    source:
      address: "0x20196Bbc7e69B0Bd2d37e63a34F14259A9f75D03"
      abi: VeSTK
      startBlock: 10497308
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - VeSTKHolder
      abis:
        - name: VeSTK
          file: ./abis/VeSTK.json
      eventHandlers:
        - event: Locked(indexed address,uint256,uint256,uint256)
          handler: handleLocked
        - event: Unlocked(indexed address,uint256)
          handler: handleUnlocked
      file: ./src/vestk.ts

  # ── Governor ──────────────────────────────────────────────
  - kind: ethereum
    name: YieldForgeGovernor
    network: sepolia
    source:
      address: "0xc9DF08305f794bC0D7D9Fc63a229957582685A11"
      abi: YieldForgeGovernor
      startBlock: 10497308
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - GovernanceProposal
      abis:
        - name: YieldForgeGovernor
          file: ./abis/YieldForgeGovernor.json
      eventHandlers:
        - event: ProposalCreated(uint256,address,address[],uint256[],string[],bytes[],uint256,uint256,string)
          handler: handleProposalCreated
        - event: VoteCast(indexed address,uint256,uint8,uint256,string)
          handler: handleVoteCast
        - event: ProposalExecuted(uint256)
          handler: handleProposalExecuted
      file: ./src/governor.ts