[profile.default]
src            = "src"
out            = "out"
libs           = ["lib"]
test           = "test"
script         = "script"
optimizer      = true
optimizer_runs = 200
solc           = "0.8.24"
remappings     = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
]

[profile.default.fuzz]
runs = 1000

[rpc_endpoints]
sepolia   = "${SEPOLIA_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
sepolia = { key = "${ETHERSCAN_KEY}", chain = "sepolia" }